apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotel-bot
  namespace: hotel-bot
  labels:
    app: hotel-bot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hotel-bot
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: hotel-bot
    spec:
      terminationGracePeriodSeconds: 30
      # Odkomentuj jeśli obraz na Docker Hub jest prywatny:
      # imagePullSecrets:
      #   - name: dockerhub-pull
      containers:
        - name: app
          image: docker.io/<user>/hotel-bot:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: hotel-bot-secret
            - configMapRef:
                name: hotel-bot-config
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
