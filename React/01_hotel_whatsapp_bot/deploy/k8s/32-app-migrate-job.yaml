apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-migrate
  namespace: hotel-bot
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: docker.io/<user>/hotel-bot:latest
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: hotel-bot-secret
            - configMapRef:
                name: hotel-bot-config
