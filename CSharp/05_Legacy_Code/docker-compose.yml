    services:
      redis:
        image: redis:alpine
        container_name: salegatech-redis
        ports:
          - "6379:6379"
        volumes:
          - redis-data:/data
        command: redis-server --appendonly yes
        healthcheck:
          test: ["CMD", "redis-cli", "ping"]
          interval: 10s
          timeout: 3s
          retries: 5
        restart: unless-stopped

      api:
        build:
          context: .
          dockerfile: src/SalegaTech.Api/Dockerfile
        container_name: salegatech-api
        ports:
          - "8080:8080"
        environment:
          - ConnectionStrings__Redis=redis:6379
          - ConnectionStrings__LegacyDb=Data Source=/app/data/legacy.db
          - ConnectionStrings__ModernDb=Data Source=/app/data/modern.db
          - ASPNETCORE_ENVIRONMENT=Development
        volumes:
          - ./data:/app/data
        depends_on:
          redis:
            condition: service_healthy
        restart: unless-stopped

      legacy-host:
        build:
          context: .
          dockerfile: src/SalegaTech.Legacy.Host/Dockerfile
        container_name: salegatech-legacy
        ports:
          - "8090:8090"
        environment:
          - ASPNETCORE_ENVIRONMENT=Development
          - ASPNETCORE_HTTP_PORTS=8090
          - ConnectionStrings__Redis=redis:6379
          - ConnectionStrings__LegacyDb=Data Source=/app/data/legacy.db
        volumes:
          - ./data:/app/data
        depends_on:
          redis:
            condition: service_healthy
        restart: unless-stopped

      redis-commander:
        image: rediscommander/redis-commander:latest
        container_name: salegatech-redis-ui
        environment:
          - REDIS_HOSTS=local:redis:6379
        ports:
          - "8081:8081"
        depends_on:
          redis:
            condition: service_healthy
        restart: unless-stopped

    volumes:
      redis-data:
      app-data: